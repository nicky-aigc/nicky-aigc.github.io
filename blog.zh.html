---
layout: default.zh
lang: zh
---

<div class="blog-section">
    <div class="blog-header">
        <h1>📝 博客</h1>
        <p>关于 AI、技术等的思考、教程和更新</p>
    </div>

    <div class="tag-filter" id="tagFilter">
        <button class="active" data-tag="all">全部</button>
    </div>

    <div class="posts-list" id="postsList">
        {% for post in site.posts %}
          {% if post.lang == 'zh' %}
        <article class="post-item">
            <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
            <div class="post-meta">
                <span><i class="fas fa-calendar"></i> {{ post.date | date: "%Y年%m月%d日" }}</span>
                <span><i class="fas fa-tags"></i>
                    {% for tag in post.tags %}
                    <span class="tag">{{ tag }}</span>
                    {% endfor %}
                </span>
            </div>
            <div class="post-excerpt">
                {{ post.excerpt }}
            </div>
            <a href="{{ post.url }}" class="read-more">阅读更多 <i class="fas fa-arrow-right"></i></a>
        </article>
          {% endif %}
        {% endfor %}
    </div>
</div>

<script>
// 简单的标签过滤（仅客户端）
document.addEventListener('DOMContentLoaded', function() {
    const posts = document.querySelectorAll('.post-item');
    const tagButtons = document.querySelectorAll('#tagFilter button');

    // 收集所有唯一标签
    const allTags = new Set();
    posts.forEach(post => {
        const tags = post.querySelectorAll('.tag');
        tags.forEach(tag => allTags.add(tag.textContent.trim()));
    });

    // 创建标签过滤按钮
    allTags.forEach(tag => {
        if (tag) {
            const button = document.createElement('button');
            button.textContent = tag;
            button.dataset.tag = tag;
            document.getElementById('tagFilter').appendChild(button);
        }
    });

    // 过滤文章
    tagButtons.forEach(button => {
        button.addEventListener('click', function() {
            tagButtons.forEach(btn => btn.classList.remove('active'));
            this.classList.add('active');

            const selectedTag = this.dataset.tag;

            posts.forEach(post => {
                if (selectedTag === 'all') {
                    post.style.display = 'block';
                } else {
                    const tags = post.querySelectorAll('.tag');
                    let hasTag = false;
                    tags.forEach(t => {
                        if (t.textContent.trim() === selectedTag) {
                            hasTag = true;
                        }
                    });
                    post.style.display = hasTag ? 'block' : 'none';
                }
            });
        });
    });
});
</script>
