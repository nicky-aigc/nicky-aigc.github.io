---
layout: default
---

<article class="post">
    <div class="container">
        <div class="post-header">
            <h1>{{ page.title }}</h1>
            <div class="post-meta">
                <span class="post-date"><i class="fas fa-calendar"></i> {{ page.date | date: "%B %d, %Y" }}</span>
                {% if page.tags %}
                <span class="post-tags"><i class="fas fa-tags"></i>
                    {% for tag in page.tags %}
                    <span class="tag">{{ tag }}</span>
                    {% endfor %}
                </span>
                {% endif %}
            </div>
        </div>

        <div class="post-content">
            {{ content }}
        </div>

        <div class="post-navigation">
            {% if page.previous %}
            <a class="prev-post" href="{{ page.previous.url }}">
                <i class="fas fa-arrow-left"></i> {{ page.previous.title }}
            </a>
            {% endif %}
            {% if page.next %}
            <a class="next-post" href="{{ page.next.url }}">
                {{ page.next.title }} <i class="fas fa-arrow-right"></i>
            </a>
            {% endif %}
        </div>

        <!-- Giscus Comments -->
        <div class="comments-section">
            <script src="https://giscus.app/client.js"
                data-repo="hugcosmos/hugcosmos.github.io"
                data-repo-id="R_kgDOO1usyA"
                data-category="Announcements"
                data-category-id="DIC_kwDOO1usyM4C4cbW"
                data-mapping="pathname"
                data-strict="0"
                data-reactions-enabled="1"
                data-emit-metadata="0"
                data-input-position="bottom"
                data-theme="light"
                data-lang="en"
                crossorigin="anonymous"
                async>
            </script>
        </div>
    </div>
</article>

<style>
.post {
    max-width: 800px;
    margin: 0 auto;
    padding: 40px 20px;
}

.post-header {
    text-align: center;
    margin-bottom: 40px;
}

.post-header h1 {
    font-size: 2.5em;
    color: #4a148c;
    margin-bottom: 20px;
}

.post-meta {
    color: #7b1fa2;
    font-size: 0.95em;
}

.post-meta span {
    margin: 0 10px;
}

.post-meta i {
    margin-right: 5px;
}

.tag {
    display: inline-block;
    background: linear-gradient(135deg, #7b1fa2 0%, #9c4dcc 100%);
    color: white;
    padding: 3px 10px;
    border-radius: 15px;
    font-size: 0.85em;
    margin: 0 3px;
}

.post-content {
    font-size: 1.1em;
    line-height: 1.8;
    color: #1a1a2e;
}

.post-content h2 {
    color: #4a148c;
    margin-top: 40px;
    margin-bottom: 20px;
}

.post-content h3 {
    color: #7b1fa2;
    margin-top: 30px;
    margin-bottom: 15px;
}

.post-content p {
    margin-bottom: 20px;
}

.post-content ul, .post-content ol {
    margin-left: 30px;
    margin-bottom: 20px;
}

.post-content li {
    margin-bottom: 10px;
}

.post-content code {
    background-color: #f3e5f5;
    color: #7b1fa2;
    padding: 2px 6px;
    border-radius: 3px;
    font-family: 'Courier New', monospace;
    font-size: 0.9em;
}

.post-content pre {
    background: linear-gradient(135deg, #311b92 0%, #4527a0 100%);
    color: #f3e5f5;
    padding: 20px;
    border-radius: 8px;
    overflow-x: auto;
    margin-bottom: 20px;
}

.post-content pre code {
    background-color: transparent;
    color: inherit;
    padding: 0;
}

.post-content blockquote {
    border-left: 4px solid #7b1fa2;
    padding-left: 20px;
    margin: 20px 0;
    color: #6a1b9a;
    font-style: italic;
    background: rgba(123, 31, 162, 0.05);
    padding: 15px 20px;
    border-radius: 0 8px 8px 0;
}

.post-content img {
    max-width: 100%;
    height: auto;
    border-radius: 8px;
    margin: 20px 0;
    box-shadow: 0 4px 15px rgba(74, 20, 140, 0.2);
}

.post-navigation {
    display: flex;
    justify-content: space-between;
    margin-top: 60px;
    padding-top: 40px;
    border-top: 2px solid rgba(123, 31, 162, 0.2);
    gap: 20px;
}

.post-navigation a {
    flex: 1;
    padding: 15px 20px;
    background: linear-gradient(135deg, #7b1fa2 0%, #9c4dcc 100%);
    color: white;
    text-decoration: none;
    border-radius: 25px;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(123, 31, 162, 0.3);
}

.post-navigation a:hover {
    background: linear-gradient(135deg, #9c4dcc 0%, #e040fb 100%);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(123, 31, 162, 0.5);
}

.prev-post {
    text-align: left;
}

.next-post {
    text-align: right;
}

.comments-section {
    margin-top: 60px;
    padding-top: 40px;
    border-top: 2px solid rgba(123, 31, 162, 0.2);
}
</style>
